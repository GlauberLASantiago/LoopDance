<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loop to Dance</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loop to Dance">
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #ff9800;
            --border: #333333;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .header {
            text-align: center;
            margin: 0;
            padding: 10px 0;
            color: var(--accent);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            /* Permite interações de arrasto no JS */
            cursor: grab;
        }
        
        .video-wrapper:active {
            cursor: grabbing;
        }

        video {
            width: 100%;
            display: block;
            /* Garante que o zoom saia do centro */
            transform-origin: center center;
            will-change: transform;
        }

        .control-panel {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: var(--border);
            color: var(--text-color);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        button:active {
            background-color: #555;
        }

        .btn-main {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 15px;
            font-size: 18px;
        }

        .btn-danger {
            background-color: transparent;
            color: #d32f2f;
            border: 1px solid #d32f2f;
            padding: 10px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-danger:active {
            background-color: #331010;
        }

        .btn-danger.confirm-mode {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        .btn-play {
            background-color: #4CAF50;
            color: white;
            padding: 8px 15px;
            flex: none;
        }
        
        .btn-stop {
            background-color: #f44336;
            color: white;
            padding: 8px 15px;
            flex: none;
        }

        .btn-resume {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 8px 15px;
            flex: none;
        }

        input[type="range"] {
            flex: 2;
            height: 30px;
        }

        .speed-val {
            min-width: 45px;
            text-align: right;
            font-family: monospace;
            font-size: 16px;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            background-color: #444;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            border: 1px solid var(--border);
        }

        .saved-loops {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .loop-item {
            display: flex;
            flex-direction: column;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid transparent;
            gap: 12px;
        }

        .loop-item.active-loop {
            border-color: var(--accent);
            background-color: #332b1f;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
        }

        .loop-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .time-adjuster {
            display: flex;
            align-items: center;
            background-color: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .time-adjuster button {
            background-color: transparent;
            color: var(--text-color);
            border: none;
            padding: 10px 15px;
            font-size: 20px;
            flex: none;
            border-radius: 0;
            line-height: 1;
        }
        
        .time-adjuster button:active {
            background-color: #333;
        }

        .time-adjuster .time-display {
            padding: 0 10px;
            font-family: monospace;
            color: var(--accent);
            font-size: 16px;
            min-width: 55px;
            text-align: center;
        }

        .arrow-separator {
            color: #777;
            font-size: 20px;
            font-weight: bold;
        }

        .merge-container {
            display: flex;
            justify-content: center;
            border-top: 1px dashed #444;
            padding-top: 10px;
        }

        .btn-merge {
            background-color: #2196F3;
            color: white;
            padding: 8px 20px;
            font-size: 14px;
            flex: none;
            border-radius: 20px;
        }

        .btn-merge:active {
            background-color: #1976D2;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: #666;
            margin-top: auto;
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="header">🩰 Loop to Dance</h1>

    <label class="file-label">
        📁 Selecionar Vídeo
        <input type="file" id="videoUpload" accept="video/*">
    </label>

    <div class="video-wrapper">
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <div class="control-panel">
        <div class="row">
            <span>Velocidade:</span>
            <input type="range" id="speedSlider" min="0.25" max="1.50" step="0.05" value="1">
            <span class="speed-val" id="speedValue">1.00x</span>
        </div>

        <div class="row" style="margin-top: 5px;">
            <span>🔍 Zoom:</span>
            <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1">
            <span class="speed-val" id="zoomValue">1.0x</span>
        </div>
        <div style="text-align: center; font-size: 12px; color: #aaa; margin-top: -5px;">
            (Ou faça pinça no vídeo. Arraste para focar)
        </div>

        <div class="row" style="margin-top: 5px;">
            <button id="btnAddMarker" class="btn-main">📍 Marcar (com vídeo em Play)</button>
        </div>
    </div>

    <div class="control-panel" id="loopsPanel" style="display: none;">
        <h3 style="margin: 0; font-size: 16px;">Trechos da Coreografia</h3>
        <div class="saved-loops" id="loopsContainer">
            <!-- Loops injetados via JS -->
        </div>
        <button id="btnClearMarkers" class="btn-danger">Limpar Todas as Marcas</button>
    </div>

</div>

<footer class="footer">
    Desenvolvido por Glauber Santiago
</footer>

<script>
    const video = document.getElementById('videoPlayer');
    const upload = document.getElementById('videoUpload');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomValue = document.getElementById('zoomValue');
    const videoWrapper = document.querySelector('.video-wrapper');
    
    const btnAddMarker = document.getElementById('btnAddMarker');
    const btnClearMarkers = document.getElementById('btnClearMarkers');
    const loopsPanel = document.getElementById('loopsPanel');
    const loopsContainer = document.getElementById('loopsContainer');

    let markers = []; 
    let activeLoopIndex = -1; 
    let clearConfirmTimeout;
    
    const ADJUST_STEP = 0.2; 

    // Sincronizar Interface com os Eventos Nativos do Vídeo
    video.addEventListener('play', renderLoops);
    video.addEventListener('pause', renderLoops);

    // Carregar vídeo local
    upload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.load();
            clearAllMarkers(true); // Limpa sem confirmação ao trocar vídeo
            resetZoom(); // Reseta o zoom no novo vídeo
        }
    });

    // Controle de Velocidade
    speedSlider.addEventListener('input', function() {
        video.playbackRate = this.value;
        speedValue.textContent = Number(this.value).toFixed(2) + 'x';
    });

    // Adicionar nova marca
    btnAddMarker.addEventListener('click', () => {
        // Arredondar para 1 casa decimal ao criar para evitar bugs matemáticos futuros
        const currentTime = Math.round(video.currentTime * 10) / 10;
        
        if (markers.some(m => Math.abs(m - currentTime) < 0.2)) return;
        
        markers.push(currentTime);
        markers.sort((a, b) => a - b); 
        
        // Mantém o loop atual ativo se inserirmos uma marca ANTES dele
        if (activeLoopIndex !== -1) {
            const newIndex = markers.indexOf(currentTime);
            if (newIndex <= activeLoopIndex) {
                activeLoopIndex++;
            }
        }
        
        renderLoops();
    });

    // Botão Inteligente de Limpar (Dois Cliques para confirmar)
    btnClearMarkers.addEventListener('click', () => {
        if (markers.length === 0) return;
        
        if (btnClearMarkers.classList.contains('confirm-mode')) {
            forceClearAllMarkers();
            btnClearMarkers.classList.remove('confirm-mode');
            btnClearMarkers.textContent = "Limpar Todas as Marcas";
            clearTimeout(clearConfirmTimeout);
        } else {
            btnClearMarkers.classList.add('confirm-mode');
            btnClearMarkers.textContent = "Confirmar Limpeza?";
            clearConfirmTimeout = setTimeout(() => {
                btnClearMarkers.classList.remove('confirm-mode');
                btnClearMarkers.textContent = "Limpar Todas as Marcas";
            }, 3000);
        }
    });

    function forceClearAllMarkers() {
        markers = [];
        activeLoopIndex = -1;
        video.pause();
        renderLoops();
    }

    // Gerador de Letras (A, B, C...)
    function getLabel(index) {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (index < 26) return letters[index];
        return letters[Math.floor(index / 26) - 1] + letters[index % 26];
    }

    // Ajustar o valor do marcador (+ e -)
    window.adjustMarker = function(index, delta) {
        let newVal = markers[index] + delta;
        
        // Arredondamento crítico para evitar problemas de ponto flutuante do JavaScript
        newVal = Math.round(newVal * 10) / 10;
        
        // Bloqueio de colisão (mantém no mínimo 0.2s de distância)
        if (index > 0 && newVal <= markers[index - 1]) {
            newVal = markers[index - 1] + 0.2;
        }
        if (index < markers.length - 1 && newVal >= markers[index + 1]) {
            newVal = markers[index + 1] - 0.2;
        }
        if (newVal < 0) newVal = 0;

        newVal = Math.round(newVal * 10) / 10; // Arredonda novamente após checagem
        markers[index] = newVal;

        // Visualizar o frame se o vídeo estiver pausado
        if (video.paused) {
             video.currentTime = newVal;
        }
        
        renderLoops();
    };

    // Fundir trechos
    window.mergeLoop = function(index) {
        markers.splice(index + 1, 1);
        if (activeLoopIndex > index) {
            activeLoopIndex--;
        }
        renderLoops();
    };

    // Alternar Treinar / Parar / Retomar - LÓGICA TOTALMENTE BLINDADA
    window.toggleLoop = function(index) {
        if (activeLoopIndex === index) {
            if (!video.paused) {
                // Se está treinando e apertou PARAR -> desativa o loop e pausa o vídeo.
                activeLoopIndex = -1; 
                video.pause();
            } else {
                // Se estava pausado (Retomar) -> Toca o vídeo novamente.
                video.play();
            }
        } else {
            // Se clicou em TREINAR em um novo loop
            activeLoopIndex = index;
            video.currentTime = markers[index];
            video.play();
        }
        // renderLoops é chamado automaticamente pelos eventos play/pause do vídeo
    };

    // Renderizar a lista de Trechos
    function renderLoops() {
        loopsContainer.innerHTML = '';
        
        if (markers.length < 2) {
            loopsPanel.style.display = 'none';
            return;
        }

        loopsPanel.style.display = 'flex';

        for (let i = 0; i < markers.length - 1; i++) {
            const startLabel = getLabel(i);
            const endLabel = getLabel(i + 1);
            
            // Sincronia perfeita com o estado atual do vídeo
            const isActive = (activeLoopIndex === i);
            const isPlaying = isActive && !video.paused;
            
            let btnClass = 'btn-play';
            let btnText = 'Treinar';

            if (isActive) {
                if (isPlaying) {
                    btnClass = 'btn-stop';
                    btnText = 'Parar';
                } else {
                    btnClass = 'btn-resume';
                    btnText = 'Retomar';
                }
            }
            
            const div = document.createElement('div');
            div.className = `loop-item ${isActive ? 'active-loop' : ''}`;
            
            div.innerHTML = `
                <div class="loop-header">
                    <span>${startLabel} ➔ ${endLabel}</span>
                    <button class="${btnClass}" onclick="toggleLoop(${i})">
                        ${btnText}
                    </button>
                </div>
                
                <div class="loop-controls">
                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i}, ${ADJUST_STEP})">+</button>
                    </div>

                    <span class="arrow-separator">➔</span>

                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i + 1}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i+1].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i + 1}, ${ADJUST_STEP})">+</button>
                    </div>
                </div>
                
                ${i < markers.length - 2 ? `
                <div class="merge-container">
                    <button class="btn-merge" onclick="mergeLoop(${i})">
                        🔗 Fundir ${startLabel} ➔ ${getLabel(i+2)}
                    </button>
                </div>` : ''}
            `;
            loopsContainer.appendChild(div);
        }
    }

    // Motor de Repetição
    function checkLoop() {
        if (activeLoopIndex !== -1 && markers.length > activeLoopIndex + 1) {
            let start = markers[activeLoopIndex];
            let end = markers[activeLoopIndex + 1];
            
            if (video.currentTime >= end || video.currentTime < start) {
                video.currentTime = start;
            }
        }
        requestAnimationFrame(checkLoop);
    }
    requestAnimationFrame(checkLoop);

    // --- SISTEMA DE ZOOM E PAN (MOVIMENTAÇÃO) ---
    let currentZoom = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startX, startY, startPanX, startPanY;
    let initialPinchDist = null;
    let initialPinchZoom = 1;

    function resetZoom() {
        currentZoom = 1; panX = 0; panY = 0;
        zoomSlider.value = 1;
        zoomValue.textContent = '1.0x';
        updateTransform();
    }

    function updateTransform() {
        video.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
        // Se tem zoom, bloqueia a rolagem normal da página na área do vídeo para permitir arrastar
        videoWrapper.style.touchAction = currentZoom > 1 ? 'none' : 'auto';
    }

    function applyPanBounds() {
        if (currentZoom === 1) {
            panX = 0;
            panY = 0;
            return;
        }
        // Calcula os limites para que o vídeo não saia da área visível quando ampliado
        const maxPanX = (videoWrapper.clientWidth * currentZoom - videoWrapper.clientWidth) / 2;
        const maxPanY = (videoWrapper.clientHeight * currentZoom - videoWrapper.clientHeight) / 2;
        
        if (panX > maxPanX) panX = maxPanX;
        if (panX < -maxPanX) panX = -maxPanX;
        if (panY > maxPanY) panY = maxPanY;
        if (panY < -maxPanY) panY = -maxPanY;
    }

    zoomSlider.addEventListener('input', (e) => {
        currentZoom = parseFloat(e.target.value);
        zoomValue.textContent = currentZoom.toFixed(1) + 'x';
        applyPanBounds();
        updateTransform();
    });

    // Eventos de Arrasto (Pan) e Pinça
    const dragStart = (e) => {
        // Só permite arrastar se tiver zoom
        if (currentZoom <= 1 && (!e.touches || e.touches.length < 2)) return;
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        startPanX = panX;
        startPanY = panY;
    };

    const dragMove = (e) => {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault(); // Previne rolar a tela acidentalmente
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        panX = startPanX + (clientX - startX);
        panY = startPanY + (clientY - startY);
        
        applyPanBounds();
        updateTransform();
    };

    const dragEnd = () => { isDragging = false; };

    // Mouse
    videoWrapper.addEventListener('mousedown', dragStart);
    window.addEventListener('mousemove', dragMove, { passive: false });
    window.addEventListener('mouseup', dragEnd);
    videoWrapper.addEventListener('mouseleave', dragEnd);

    // Toque (Celular)
    videoWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            if (e.cancelable) e.preventDefault();
            isDragging = false;
            initialPinchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            initialPinchZoom = currentZoom;
        } else {
            dragStart(e);
        }
    }, { passive: false });

    videoWrapper.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialPinchDist) {
            if (e.cancelable) e.preventDefault();
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            // Calcula novo zoom baseado na distância dos dedos limitando entre 1x e 4x
            currentZoom = Math.min(Math.max(1, initialPinchZoom * (dist / initialPinchDist)), 4);
            zoomSlider.value = currentZoom;
            zoomValue.textContent = currentZoom.toFixed(1) + 'x';
            applyPanBounds();
            updateTransform();
        } else if (e.touches.length === 1) {
            dragMove(e);
        }
    }, { passive: false });

    videoWrapper.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) initialPinchDist = null;
        if (e.touches.length === 0) dragEnd();
    });

</script>

</body>
</html>
