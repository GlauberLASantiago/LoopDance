
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loop to Dance</title>
    <!-- Favicon exigido pela estrutura -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loop to Dance">
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #ff9800;
            --border: #333333;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .header {
            text-align: center;
            margin: 0;
            padding: 5px 0 10px 0;
            color: var(--accent);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Área de Vídeo */
        .video-area {
            width: 100%;
            padding: 0 30px 0 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .scroll-hint {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin: 0;
        }

        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        /* Paineis */
        .control-panel {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-controls {
            padding: 10px 15px;
            gap: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        /* Botões Gerais */
        button {
            background-color: var(--border);
            color: var(--text-color);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        button:active { background-color: #555; }

        .btn-main {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 15px;
            font-size: 18px;
        }

        .btn-danger {
            background-color: transparent;
            color: #d32f2f;
            border: 1px solid #d32f2f;
            padding: 10px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-danger:active { background-color: #331010; }
        .btn-danger.confirm-mode {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        .btn-play { background-color: #4CAF50; color: white; padding: 8px 15px; flex: none; min-width: 80px; }
        .btn-stop { background-color: #f44336; color: white; padding: 8px 15px; flex: none; min-width: 80px; }
        .btn-resume { background-color: var(--accent); color: #000; font-weight: bold; padding: 8px 15px; flex: none; min-width: 80px; }
        
        .btn-merge-inline {
            background-color: transparent;
            color: #2196F3;
            border: 1px solid #2196F3;
            padding: 8px 12px;
            font-size: 14px;
            flex: none;
            border-radius: 6px;
        }
        .btn-merge-inline:active { background-color: #1a3b5c; }

        /* Controles de Input (Range e File) */
        input[type="range"] { flex: 2; height: 30px; }
        .control-val { min-width: 45px; text-align: right; font-family: monospace; font-size: 16px; }
        input[type="file"] { display: none; }
        
        .file-label {
            background-color: #444;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            border: 1px solid var(--border);
        }

        /* UI dos Loops */
        .saved-loops { display: flex; flex-direction: column; gap: 10px; }
        
        .loop-item {
            display: flex;
            flex-direction: column;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid transparent;
            gap: 12px;
        }

        .loop-item.active-loop {
            border-color: var(--accent);
            background-color: #332b1f;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
        }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }

        .loop-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .time-adjuster {
            display: flex;
            align-items: center;
            background-color: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .time-adjuster button {
            background-color: #222;
            color: var(--accent);
            border: none;
            padding: 10px 14px; 
            font-size: 20px;
            flex: none;
            border-radius: 0;
            line-height: 1;
            font-weight: bold;
        }
        
        .time-adjuster button:active { background-color: #444; }

        .time-adjuster .time-display {
            padding: 0 10px; 
            font-family: monospace;
            color: var(--text-color);
            font-size: 15px;
            min-width: 48px;
            text-align: center;
        }

        .arrow-separator { color: #777; font-size: 20px; font-weight: bold; }

        /* Estilos do Histórico e Miniaturas */
        .history-item {
            display: flex;
            flex-direction: column;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #444;
            gap: 5px;
        }
        
        .history-item.favorite {
            border-left-color: #FFD700;
        }

        .history-item-content {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .history-thumb {
            width: 70px;
            height: 70px;
            background-color: #111;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid #444;
        }

        .history-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .history-title {
            font-size: 15px;
            font-weight: bold;
            word-break: break-all;
            color: var(--text-color);
            cursor: pointer;
            flex: 1;
        }
        
        .history-title:active {
            opacity: 0.7;
        }

        .btn-star {
            background: none;
            border: none;
            padding: 5px;
            font-size: 20px;
            flex: none;
            cursor: pointer;
            filter: grayscale(100%);
            opacity: 0.5;
            transition: all 0.2s;
        }

        .btn-star.is-fav {
            filter: grayscale(0%);
            opacity: 1;
        }

        .history-meta {
            font-size: 11px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Permite quebrar linha se ecrã for muito pequeno */
            gap: 8px;
        }

        .history-empty {
            text-align: center;
            font-size: 14px;
            color: #777;
            padding: 10px;
        }

        /* Modal Customizado */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .modal-filename {
            color: var(--accent);
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin: 10px 0;
            word-break: break-all;
        }

        .modal-thumb {
            width: 100%;
            max-width: 180px;
            height: auto;
            border-radius: 8px;
            margin: 10px auto 20px auto;
            display: none;
            border: 2px solid var(--border);
            object-fit: cover;
        }

        .modal-btn-primary {
            width: 100%;
            margin-bottom: 10px;
            padding: 15px;
            font-size: 16px;
        }
        
        .modal-btn-cancel {
            width: 100%;
            background: transparent;
            color: #aaa;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: #666;
            margin-top: auto;
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="header">🩰 Loop to Dance</h1>

    <label class="file-label">
        📁 Selecionar Vídeo (Restaura Salvos)
        <input type="file" id="videoUpload" accept="video/*">
    </label>

    <!-- Controles no topo -->
    <div class="control-panel top-controls">
        <div class="row">
            <span style="font-size: 14px; width: 85px;">Velocidade:</span>
            <input type="range" id="speedSlider" min="0.25" max="1.50" step="0.05" value="1">
            <span class="control-val" id="speedValue">1.00x</span>
        </div>
        <div class="row">
            <span style="font-size: 14px; width: 85px;">Zoom:</span>
            <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1">
            <span class="control-val" id="zoomValue">1.0x</span>
        </div>
    </div>

    <!-- Container do vídeo com margem direita para scroll -->
    <div class="video-area">
        <p class="scroll-hint" id="videoTitleHint">↕️ Use a margem direita para rolar a tela</p>
        <div class="video-wrapper" id="videoContainer">
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <!-- Painel de Marcação -->
    <div class="control-panel">
        <div class="row">
            <button id="btnAddMarker" class="btn-main">📍 Marcar (com vídeo em Play)</button>
        </div>
    </div>

    <!-- Lista de Loops -->
    <div class="control-panel" id="loopsPanel" style="display: none;">
        <h3 style="margin: 0; font-size: 16px;">Trechos da Coreografia</h3>
        <div class="saved-loops" id="loopsContainer">
            <!-- Loops injetados via JS -->
        </div>
        <button id="btnClearMarkers" class="btn-danger">Limpar Todas as Marcas</button>
    </div>

    <!-- Histórico de Vídeos -->
    <div class="control-panel">
        <div class="row" style="align-items: flex-end;">
            <h3 style="margin: 0; font-size: 16px;">Biblioteca de Vídeos</h3>
            <button id="btnClearHistory" class="btn-danger" style="margin:0; padding: 6px 10px; flex: none; font-size: 12px; border-radius: 4px;">Limpar Histórico</button>
        </div>
        <p style="font-size: 11px; color: #888; margin: -5px 0 5px 0;">Toque em um vídeo abaixo para restaurar seus trechos.</p>
        <div class="saved-loops" id="historyContainer">
            <!-- Histórico injetado via JS -->
        </div>
    </div>

</div>

<footer class="footer">
    Desenvolvido por Glauber Santiago
</footer>

<!-- Modal Customizado para Solicitar Arquivo -->
<div id="customModal" class="modal-overlay">
    <div class="modal-content">
        <p id="modalText" style="display: none; font-size: 16px; margin-bottom: 15px;"></p>
        <span class="modal-filename" id="modalFileName">nome_do_arquivo.mp4</span>
        
        <div style="font-size: 15px; color: #ccc; margin: 15px 0; line-height: 1.6;">
            ⏱️ Duração: <span id="modalDuration">--:--</span><br>
            📅 Data do Arquivo: <span id="modalFileDate">--/--/----</span>
        </div>

        <img id="modalThumb" class="modal-thumb" src="" alt="Miniatura do vídeo">
        
        <button id="modalBtnConfirm" class="btn-main modal-btn-primary">Selecionar na Galeria</button>
        <button id="modalBtnCancel" class="modal-btn-cancel">Cancelar</button>
    </div>
</div>

<script>
    // ======== ELEMENTOS DO DOM ========
    const video = document.getElementById('videoPlayer');
    const videoContainer = document.getElementById('videoContainer');
    const upload = document.getElementById('videoUpload');
    const videoTitleHint = document.getElementById('videoTitleHint');
    
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomValue = document.getElementById('zoomValue');
    
    const btnAddMarker = document.getElementById('btnAddMarker');
    const btnClearMarkers = document.getElementById('btnClearMarkers');
    const loopsPanel = document.getElementById('loopsPanel');
    const loopsContainer = document.getElementById('loopsContainer');
    
    const historyContainer = document.getElementById('historyContainer');
    const btnClearHistory = document.getElementById('btnClearHistory');
    
    // Modal Elements
    const customModal = document.getElementById('customModal');
    const modalFileName = document.getElementById('modalFileName');
    const modalDuration = document.getElementById('modalDuration');
    const modalFileDate = document.getElementById('modalFileDate');
    const modalThumb = document.getElementById('modalThumb');
    const modalBtnConfirm = document.getElementById('modalBtnConfirm');
    const modalBtnCancel = document.getElementById('modalBtnCancel');

    // ======== ESTADOS DO APP ========
    let markers = []; 
    let activeLoopIndex = -1; 
    let clearConfirmTimeout;
    let historyClearTimeout;
    const ADJUST_STEP = 0.2; 
    
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0, startY = 0, lastDistance = 0;
    let thumbnailCaptured = false; 

    // ======== LÓGICA DE HISTÓRICO E LOCALSTORAGE ========
    const STORAGE_KEY = 'loopDance_videoHistory';
    let videoHistory = {}; 
    let currentVideoId = null;

    function loadHistoryFromStorage() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) videoHistory = JSON.parse(data);
        } catch (e) {
            console.error("Erro ao ler localStorage", e);
            videoHistory = {};
        }
        renderHistory();
    }

    function saveHistoryToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(videoHistory));
        renderHistory();
    }

    function syncCurrentVideoData() {
        if (!currentVideoId || !videoHistory[currentVideoId]) return;
        videoHistory[currentVideoId].markers = [...markers];
        saveHistoryToStorage();
    }

    // --- FORMATAÇÃO DE TEMPO (Duração) ---
    function formatDuration(seconds) {
        if (!seconds || isNaN(seconds)) return '--:--';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- CAPTURA DE DURAÇÃO ---
    video.addEventListener('loadedmetadata', () => {
        if (currentVideoId && videoHistory[currentVideoId]) {
            videoHistory[currentVideoId].duration = video.duration;
            saveHistoryToStorage();
        }
    });

    // --- CAPTURA DE MINIATURA AUTOMÁTICA (Corrigido para Android) ---
    function captureAndSaveThumbnail() {
        if (thumbnailCaptured || !currentVideoId || !videoHistory[currentVideoId]) return;

        try {
            const canvas = document.createElement('canvas');
            canvas.width = 160; 
            canvas.height = Math.floor((video.videoHeight / video.videoWidth) * 160) || 120;
            if (canvas.height === 0 || canvas.width === 0) return;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Android frequentemente retorna um frame preto/vazio se capturar cedo demais.
            // Vamos checar os pixels para garantir que não estamos salvando uma tela preta.
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let isBlank = true;
            for (let i = 0; i < imageData.length; i += 40) { // Verifica 1 a cada 10 pixels por performance
                if (imageData[i] > 15 || imageData[i+1] > 15 || imageData[i+2] > 15) {
                    isBlank = false;
                    break;
                }
            }

            if (isBlank) return; // Se a imagem for totalmente escura/preta, aborta e tenta de novo

            const thumbData = canvas.toDataURL('image/jpeg', 0.6); 
            if (thumbData.length > 1000) { 
                videoHistory[currentVideoId].thumbnail = thumbData;
                saveHistoryToStorage();
                thumbnailCaptured = true;
            }
        } catch (e) { console.error("Erro thumb", e); }
    }

    // Tentar capturar no primeiro frame disponível
    video.addEventListener('loadeddata', () => {
        if (currentVideoId && videoHistory[currentVideoId] && !videoHistory[currentVideoId].thumbnail) {
            video.currentTime = 0.1; // No Android, 0.1s funciona melhor que 0.001s para evitar bugs de keyframe
        }
    });

    video.addEventListener('seeked', () => {
        if (!thumbnailCaptured && video.currentTime <= 0.2 && currentVideoId && videoHistory[currentVideoId]) {
            captureAndSaveThumbnail();
            if (thumbnailCaptured) video.currentTime = 0; // Volta para o início exato se der certo
        }
    });

    // Fallback de segurança: se o seek inicial der tela preta, ele tenta de novo enquanto o vídeo toca
    video.addEventListener('timeupdate', () => {
        if (!thumbnailCaptured && video.currentTime > 0) {
            captureAndSaveThumbnail();
        }
    });

    // Modal Handlers
    window.requestVideoRestore = function(id) {
        if (!videoHistory[id]) return;
        
        if (id === currentVideoId) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }

        const modalTextEl = document.getElementById('modalText');
        if(modalTextEl) modalTextEl.style.display = 'none';

        modalFileName.textContent = videoHistory[id].title;
        modalDuration.textContent = formatDuration(videoHistory[id].duration);
        
        if (videoHistory[id].fileDate) {
            const fd = new Date(videoHistory[id].fileDate);
            modalFileDate.textContent = fd.toLocaleDateString('pt-BR');
        } else {
            modalFileDate.textContent = "Desconhecida";
        }

        if (videoHistory[id].thumbnail) {
            modalThumb.src = videoHistory[id].thumbnail;
            modalThumb.style.display = 'block';
        } else {
            modalThumb.style.display = 'none';
        }
        customModal.style.display = 'flex';
    };

    modalBtnConfirm.addEventListener('click', () => {
        customModal.style.display = 'none';
        upload.click(); 
    });

    modalBtnCancel.addEventListener('click', () => {
        customModal.style.display = 'none';
    });

    function renderHistory() {
        historyContainer.innerHTML = '';
        const videos = Object.values(videoHistory);
        
        if (videos.length === 0) {
            historyContainer.innerHTML = '<div class="history-empty">Nenhum vídeo no histórico ainda.</div>';
            return;
        }

        videos.sort((a, b) => {
            if (a.isFavorite && !b.isFavorite) return -1;
            if (!a.isFavorite && b.isFavorite) return 1;
            return b.lastAccessed - a.lastAccessed;
        });

        videos.forEach(vid => {
            const dateObj = new Date(vid.lastAccessed);
            const dateStr = dateObj.toLocaleDateString('pt-BR') + ' ' + dateObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            const marksCount = (vid.markers && vid.markers.length) || 0;
            const loopCount = marksCount > 1 ? marksCount - 1 : 0;
            const durationStr = formatDuration(vid.duration);
            
            const isCurrentlyOpen = (vid.id === currentVideoId);
            const borderStyle = isCurrentlyOpen ? 'border: 1px solid var(--accent);' : '';
            const thumbSrc = vid.thumbnail || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23222"/><text y="50%" x="50%" dominant-baseline="middle" text-anchor="middle" font-size="40">🎥</text></svg>';

            const div = document.createElement('div');
            div.className = `history-item ${vid.isFavorite ? 'favorite' : ''}`;
            div.style.cssText = borderStyle;
            
            div.innerHTML = `
                <div class="history-item-content">
                    <img class="history-thumb" src="${thumbSrc}" alt="Thumbnail" onclick="requestVideoRestore('${vid.id}')" style="cursor:pointer;">
                    <div class="history-info">
                        <div class="history-header">
                            <span class="history-title" onclick="requestVideoRestore('${vid.id}')">
                                ${vid.title} 
                                <br><span style="font-size: 11px; font-weight: normal; color: #888;">
                                    ${isCurrentlyOpen ? '(Ativo no momento)' : '👉 Toque para abrir'}
                                </span>
                            </span>
                            <button class="btn-star ${vid.isFavorite ? 'is-fav' : ''}" onclick="toggleFavorite('${vid.id}')">⭐</button>
                        </div>
                        <div class="history-meta">
                            <span>⏱️ ${durationStr}</span>
                            <span>📅 ${dateStr}</span>
                            <span style="color: var(--accent); font-weight: bold;">Trechos: ${loopCount}</span>
                        </div>
                    </div>
                </div>
            `;
            historyContainer.appendChild(div);
        });
    }

    window.toggleFavorite = function(id) {
        if (videoHistory[id]) {
            videoHistory[id].isFavorite = !videoHistory[id].isFavorite;
            saveHistoryToStorage();
        }
    };

    btnClearHistory.addEventListener('click', () => {
        if (Object.keys(videoHistory).length === 0) return;
        
        if (btnClearHistory.classList.contains('confirm-mode')) {
            videoHistory = {};
            currentVideoId = null;
            localStorage.removeItem(STORAGE_KEY);
            forceClearAllMarkers(true);
            videoTitleHint.textContent = "↕️ Use a margem direita para rolar a tela";
            btnClearHistory.classList.remove('confirm-mode');
            btnClearHistory.textContent = "Limpar Histórico";
            clearTimeout(historyClearTimeout);
            renderHistory();
        } else {
            btnClearHistory.classList.add('confirm-mode');
            btnClearHistory.textContent = "Confirmar Apagar?";
            historyClearTimeout = setTimeout(() => {
                btnClearHistory.classList.remove('confirm-mode');
                btnClearHistory.textContent = "Limpar Histórico";
            }, 3000);
        }
    });

    // ======== PWA ========
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', () => {});`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    }

    // ======== CARREGAR VÍDEO ========
    upload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.load();
            
            currentVideoId = file.name + '_' + file.size;
            thumbnailCaptured = false; 
            
            if (videoHistory[currentVideoId]) {
                markers = videoHistory[currentVideoId].markers || [];
                videoHistory[currentVideoId].lastAccessed = Date.now();
                // Garante que vídeos antigos sem data ganhem o atributo agora
                if(!videoHistory[currentVideoId].fileDate && file.lastModified) {
                    videoHistory[currentVideoId].fileDate = file.lastModified;
                }
            } else {
                markers = [];
                videoHistory[currentVideoId] = {
                    id: currentVideoId,
                    title: file.name,
                    lastAccessed: Date.now(),
                    fileDate: file.lastModified || Date.now(),
                    isFavorite: false,
                    markers: [],
                    duration: 0 // Será atualizado no evento loadedmetadata
                };
            }
            
            activeLoopIndex = -1;
            resetZoom();
            saveHistoryToStorage();
            renderLoops();
            
            videoTitleHint.textContent = `Ativo: ${file.name}`;
            videoTitleHint.style.color = "var(--accent)";
            videoTitleHint.style.fontWeight = "bold";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    // ======== CONTROLES DE VELOCIDADE E ZOOM ========
    speedSlider.addEventListener('input', function() {
        video.playbackRate = this.value;
        speedValue.textContent = Number(this.value).toFixed(2) + 'x';
    });

    zoomSlider.addEventListener('input', function() {
        scale = parseFloat(this.value);
        applyTransform();
    });

    function resetZoom() {
        scale = 1; translateX = 0; translateY = 0;
        zoomSlider.value = 1;
        applyTransform();
    }

    function applyTransform() {
        const maxTx = (video.clientWidth * scale - videoContainer.clientWidth) / 2;
        const maxTy = (video.clientHeight * scale - videoContainer.clientHeight) / 2;
        translateX = maxTx > 0 ? Math.max(Math.min(translateX, maxTx), -maxTx) : 0;
        translateY = maxTy > 0 ? Math.max(Math.min(translateY, maxTy), -maxTy) : 0;
        video.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        zoomSlider.value = scale;
        zoomValue.textContent = scale.toFixed(1) + 'x';
    }

    videoContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1 && scale > 1) {
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        } else if (e.touches.length === 2) {
            isDragging = false;
            lastDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, { passive: false });

    videoContainer.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && isDragging && scale > 1) {
            e.preventDefault(); 
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            applyTransform();
        } else if (e.touches.length === 2) {
            e.preventDefault(); 
            const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            scale = Math.max(1, Math.min(scale + (currentDistance - lastDistance) * 0.01, 4)); 
            lastDistance = currentDistance;
            applyTransform();
        }
    }, { passive: false });

    videoContainer.addEventListener('touchend', () => { isDragging = false; });

    // ======== LÓGICA DE MARCAÇÕES ========
    video.addEventListener('play', renderLoops);
    video.addEventListener('pause', renderLoops);

    btnAddMarker.addEventListener('click', () => {
        if(!currentVideoId) {
            modalFileName.textContent = "(Nenhum vídeo carregado)";
            const modalTextEl = document.getElementById('modalText');
            if(modalTextEl) {
                modalTextEl.innerHTML = 'É necessário <b>selecionar um arquivo</b> de vídeo antes de adicionar marcas!';
                modalTextEl.style.display = 'block';
            }
            modalBtnConfirm.textContent = "Selecionar Vídeo";
            customModal.style.display = 'flex';
            return;
        }
        
        const currentTime = Math.round(video.currentTime * 10) / 10;
        if (markers.some(m => Math.abs(m - currentTime) < 0.2)) return;
        
        markers.push(currentTime);
        markers.sort((a, b) => a - b); 
        
        if (activeLoopIndex !== -1 && markers.indexOf(currentTime) <= activeLoopIndex) {
            activeLoopIndex++;
        }
        syncCurrentVideoData();
        renderLoops();
    });

    btnClearMarkers.addEventListener('click', () => {
        if (markers.length === 0) return;
        
        if (btnClearMarkers.classList.contains('confirm-mode')) {
            forceClearAllMarkers();
            btnClearMarkers.classList.remove('confirm-mode');
            btnClearMarkers.textContent = "Limpar Todas as Marcas";
            clearTimeout(clearConfirmTimeout);
        } else {
            btnClearMarkers.classList.add('confirm-mode');
            btnClearMarkers.textContent = "Confirmar Limpeza?";
            clearConfirmTimeout = setTimeout(() => {
                btnClearMarkers.classList.remove('confirm-mode');
                btnClearMarkers.textContent = "Limpar Todas as Marcas";
            }, 3000);
        }
    });

    function forceClearAllMarkers(skipSync = false) {
        markers = [];
        activeLoopIndex = -1;
        video.pause();
        if(!skipSync) syncCurrentVideoData();
        renderLoops();
    }

    function getLabel(index) {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        return index < 26 ? letters[index] : letters[Math.floor(index / 26) - 1] + letters[index % 26];
    }

    window.adjustMarker = function(index, delta) {
        let newVal = Math.round((markers[index] + delta) * 10) / 10;
        if (index > 0 && newVal <= markers[index - 1]) newVal = markers[index - 1] + 0.2;
        if (index < markers.length - 1 && newVal >= markers[index + 1]) newVal = markers[index + 1] - 0.2;
        if (newVal < 0) newVal = 0;

        markers[index] = Math.round(newVal * 10) / 10;
        if (video.paused) video.currentTime = markers[index];
        
        syncCurrentVideoData();
        renderLoops();
    };

    window.mergeLoop = function(index) {
        markers.splice(index + 1, 1);
        if (activeLoopIndex > index) activeLoopIndex--;
        syncCurrentVideoData();
        renderLoops();
    };

    window.toggleLoop = function(index) {
        if (activeLoopIndex === index) {
            if (!video.paused) { activeLoopIndex = -1; video.pause(); } 
            else { video.play(); }
        } else {
            activeLoopIndex = index;
            video.currentTime = markers[index];
            video.play();
        }
    };

    function renderLoops() {
        loopsContainer.innerHTML = '';
        
        if (markers.length < 2) {
            loopsPanel.style.display = 'none';
            return;
        }

        loopsPanel.style.display = 'flex';

        for (let i = 0; i < markers.length - 1; i++) {
            const startLabel = getLabel(i);
            const endLabel = getLabel(i + 1);
            const isActive = (activeLoopIndex === i);
            const isPlaying = isActive && !video.paused;
            
            let btnClass = 'btn-play', btnText = 'Treinar';
            if (isActive) {
                if (isPlaying) { btnClass = 'btn-stop'; btnText = 'Parar'; } 
                else { btnClass = 'btn-resume'; btnText = 'Retomar'; }
            }
            
            const div = document.createElement('div');
            div.className = `loop-item ${isActive ? 'active-loop' : ''}`;
            
            div.innerHTML = `
                <div class="loop-header">
                    <span>${startLabel} ➔ ${endLabel}</span>
                    <div class="header-actions">
                        ${i < markers.length - 2 ? `<button class="btn-merge-inline" onclick="mergeLoop(${i})">🔗 Juntar</button>` : ''}
                        <button class="${btnClass}" onclick="toggleLoop(${i})">${btnText}</button>
                    </div>
                </div>
                
                <div class="loop-controls">
                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i}, ${ADJUST_STEP})">+</button>
                    </div>
                    <span class="arrow-separator">➔</span>
                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i + 1}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i+1].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i + 1}, ${ADJUST_STEP})">+</button>
                    </div>
                </div>
            `;
            loopsContainer.appendChild(div);
        }
    }

    function checkLoop() {
        if (activeLoopIndex !== -1 && markers.length > activeLoopIndex + 1) {
            let start = markers[activeLoopIndex];
            let end = markers[activeLoopIndex + 1];
            if (video.currentTime >= end || video.currentTime < start) video.currentTime = start;
        }
        requestAnimationFrame(checkLoop);
    }
    
    // Inicialização
    loadHistoryFromStorage();
    requestAnimationFrame(checkLoop);

</script>

</body>
</html>
