<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loop to Dance</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loop to Dance">
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #ff9800;
            --border: #333333;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .header {
            text-align: center;
            margin: 0;
            padding: 5px 0 10px 0;
            color: var(--accent);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* NOVA ÁREA DE VÍDEO: Margem segura na direita para scroll */
        .video-area {
            width: 100%;
            padding: 0 30px 0 0; /* Sem espaço na esquerda, 30px na direita para rolar a tela */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .scroll-hint {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin: 0;
        }

        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            touch-action: none; /* Bloqueia o scroll nativo APENAS dentro desta caixa */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
            transform-origin: center center;
            transition: transform 0.1s ease-out; /* Suaviza o movimento do zoom */
        }

        .control-panel {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-controls {
            padding: 10px 15px;
            gap: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: var(--border);
            color: var(--text-color);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        button:active {
            background-color: #555;
        }

        .btn-main {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 15px;
            font-size: 18px;
        }

        .btn-danger {
            background-color: transparent;
            color: #d32f2f;
            border: 1px solid #d32f2f;
            padding: 10px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-danger:active {
            background-color: #331010;
        }

        .btn-danger.confirm-mode {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        .btn-play {
            background-color: #4CAF50;
            color: white;
            padding: 8px 15px;
            flex: none;
            min-width: 80px;
        }
        
        .btn-stop {
            background-color: #f44336;
            color: white;
            padding: 8px 15px;
            flex: none;
            min-width: 80px;
        }

        .btn-resume {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 8px 15px;
            flex: none;
            min-width: 80px;
        }
        
        .btn-merge-inline {
            background-color: transparent;
            color: #2196F3;
            border: 1px solid #2196F3;
            padding: 8px 12px;
            font-size: 14px;
            flex: none;
            border-radius: 6px;
        }

        .btn-merge-inline:active {
            background-color: #1a3b5c;
        }

        input[type="range"] {
            flex: 2;
            height: 30px;
        }

        .control-val {
            min-width: 45px;
            text-align: right;
            font-family: monospace;
            font-size: 16px;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            background-color: #444;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            border: 1px solid var(--border);
        }

        .saved-loops {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .loop-item {
            display: flex;
            flex-direction: column;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid transparent;
            gap: 12px;
        }

        .loop-item.active-loop {
            border-color: var(--accent);
            background-color: #332b1f;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
        }
        
        .header-actions {
            display: flex;
            gap: 15px; 
            align-items: center;
        }

        .loop-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .time-adjuster {
            display: flex;
            align-items: center;
            background-color: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .time-adjuster button {
            background-color: #222;
            color: var(--accent);
            border: none;
            padding: 10px 14px; /* Espaçamento reduzido para caber na tela */
            font-size: 20px; /* Fonte levemente menor */
            flex: none;
            border-radius: 0;
            line-height: 1;
            font-weight: bold;
        }
        
        .time-adjuster button:active {
            background-color: #444;
        }

        .time-adjuster .time-display {
            padding: 0 10px; /* Reduzido o espaço em volta do número */
            font-family: monospace;
            color: var(--text-color);
            font-size: 15px; /* Fonte do número menor */
            min-width: 48px; /* Largura mínima ajustada */
            text-align: center;
        }

        .arrow-separator {
            color: #777;
            font-size: 20px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: #666;
            margin-top: auto;
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="header">🩰 Loop to Dance</h1>

    <label class="file-label">
        📁 Selecionar Vídeo
        <input type="file" id="videoUpload" accept="video/*">
    </label>

    <!-- Controles no topo -->
    <div class="control-panel top-controls">
        <div class="row">
            <span style="font-size: 14px; width: 85px;">Velocidade:</span>
            <input type="range" id="speedSlider" min="0.25" max="1.50" step="0.05" value="1">
            <span class="control-val" id="speedValue">1.00x</span>
        </div>
        <div class="row">
            <span style="font-size: 14px; width: 85px;">Zoom:</span>
            <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1">
            <span class="control-val" id="zoomValue">1.0x</span>
        </div>
    </div>

    <!-- Container do vídeo com margem direita para scroll -->
    <div class="video-area">
        <p class="scroll-hint">↕️ Use a margem direita para rolar a tela</p>
        <div class="video-wrapper" id="videoContainer">
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <!-- Painel de Marcação -->
    <div class="control-panel">
        <div class="row">
            <button id="btnAddMarker" class="btn-main">📍 Marcar (com vídeo em Play)</button>
        </div>
    </div>

    <!-- Lista de Loops -->
    <div class="control-panel" id="loopsPanel" style="display: none;">
        <h3 style="margin: 0; font-size: 16px;">Trechos da Coreografia</h3>
        <div class="saved-loops" id="loopsContainer">
            <!-- Loops injetados via JS -->
        </div>
        <button id="btnClearMarkers" class="btn-danger">Limpar Todas as Marcas</button>
    </div>

</div>

<footer class="footer">
    Desenvolvido por Glauber Santiago
</footer>

<script>
    const video = document.getElementById('videoPlayer');
    const videoContainer = document.getElementById('videoContainer');
    const upload = document.getElementById('videoUpload');
    
    // Controles Topo
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomValue = document.getElementById('zoomValue');
    
    // Controles Loops
    const btnAddMarker = document.getElementById('btnAddMarker');
    const btnClearMarkers = document.getElementById('btnClearMarkers');
    const loopsPanel = document.getElementById('loopsPanel');
    const loopsContainer = document.getElementById('loopsContainer');

    // Variáveis Lógicas do Loop
    let markers = []; 
    let activeLoopIndex = -1; 
    let clearConfirmTimeout;
    const ADJUST_STEP = 0.2; 

    // Variáveis Lógicas do Zoom e Pan
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastDistance = 0;

    // Sincronizar Interface com os Eventos Nativos do Vídeo
    video.addEventListener('play', renderLoops);
    video.addEventListener('pause', renderLoops);

    // ======== PWA ========
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { self.clients.claim(); });
            self.addEventListener('fetch', (e) => { });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    }

    const manifest = {
        name: "Loop to Dance",
        short_name: "Loop to Dance",
        start_url: ".",
        display: "standalone",
        background_color: "#121212",
        theme_color: "#121212",
        icons: [{
            src: "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>",
            sizes: "192x192",
            type: "image/svg+xml"
        }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.head.appendChild(Object.assign(document.createElement('link'), {
        rel: 'manifest', href: URL.createObjectURL(manifestBlob)
    }));

    // ======== CARREGAR VÍDEO ========
    upload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.load();
            forceClearAllMarkers();
            resetZoom();
        }
    });

    // ======== CONTROLES DE VELOCIDADE E ZOOM ========
    speedSlider.addEventListener('input', function() {
        video.playbackRate = this.value;
        speedValue.textContent = Number(this.value).toFixed(2) + 'x';
    });

    zoomSlider.addEventListener('input', function() {
        scale = parseFloat(this.value);
        applyTransform();
    });

    function resetZoom() {
        scale = 1;
        translateX = 0;
        translateY = 0;
        zoomSlider.value = 1;
        applyTransform();
    }

    function applyTransform() {
        const maxTx = (video.clientWidth * scale - videoContainer.clientWidth) / 2;
        const maxTy = (video.clientHeight * scale - videoContainer.clientHeight) / 2;

        if (maxTx > 0) {
            translateX = Math.max(Math.min(translateX, maxTx), -maxTx);
        } else {
            translateX = 0;
        }

        if (maxTy > 0) {
            translateY = Math.max(Math.min(translateY, maxTy), -maxTy);
        } else {
            translateY = 0;
        }

        video.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        zoomSlider.value = scale;
        zoomValue.textContent = scale.toFixed(1) + 'x';
    }

    // Eventos de toque para Pinch (Zoom) e Pan (Arrastar) - Focado no #videoContainer
    videoContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1 && scale > 1) {
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        } else if (e.touches.length === 2) {
            isDragging = false;
            lastDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
    }, { passive: false });

    videoContainer.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && isDragging && scale > 1) {
            e.preventDefault(); 
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            applyTransform();
        } else if (e.touches.length === 2) {
            e.preventDefault(); 
            const currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const delta = currentDistance - lastDistance;
            scale += delta * 0.01;
            scale = Math.max(1, Math.min(scale, 4)); 
            lastDistance = currentDistance;
            applyTransform();
        }
    }, { passive: false });

    videoContainer.addEventListener('touchend', () => {
        isDragging = false;
    });

    // ======== LÓGICA DE MARCAÇÕES ========
    btnAddMarker.addEventListener('click', () => {
        const currentTime = Math.round(video.currentTime * 10) / 10;
        if (markers.some(m => Math.abs(m - currentTime) < 0.2)) return;
        
        markers.push(currentTime);
        markers.sort((a, b) => a - b); 
        
        if (activeLoopIndex !== -1) {
            const newIndex = markers.indexOf(currentTime);
            if (newIndex <= activeLoopIndex) {
                activeLoopIndex++;
            }
        }
        renderLoops();
    });

    btnClearMarkers.addEventListener('click', () => {
        if (markers.length === 0) return;
        
        if (btnClearMarkers.classList.contains('confirm-mode')) {
            forceClearAllMarkers();
            btnClearMarkers.classList.remove('confirm-mode');
            btnClearMarkers.textContent = "Limpar Todas as Marcas";
            clearTimeout(clearConfirmTimeout);
        } else {
            btnClearMarkers.classList.add('confirm-mode');
            btnClearMarkers.textContent = "Confirmar Limpeza?";
            clearConfirmTimeout = setTimeout(() => {
                btnClearMarkers.classList.remove('confirm-mode');
                btnClearMarkers.textContent = "Limpar Todas as Marcas";
            }, 3000);
        }
    });

    function forceClearAllMarkers() {
        markers = [];
        activeLoopIndex = -1;
        video.pause();
        renderLoops();
    }

    function getLabel(index) {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (index < 26) return letters[index];
        return letters[Math.floor(index / 26) - 1] + letters[index % 26];
    }

    window.adjustMarker = function(index, delta) {
        let newVal = markers[index] + delta;
        newVal = Math.round(newVal * 10) / 10;
        
        if (index > 0 && newVal <= markers[index - 1]) newVal = markers[index - 1] + 0.2;
        if (index < markers.length - 1 && newVal >= markers[index + 1]) newVal = markers[index + 1] - 0.2;
        if (newVal < 0) newVal = 0;

        newVal = Math.round(newVal * 10) / 10;
        markers[index] = newVal;

        if (video.paused) {
             video.currentTime = newVal;
        }
        renderLoops();
    };

    window.mergeLoop = function(index) {
        markers.splice(index + 1, 1);
        if (activeLoopIndex > index) activeLoopIndex--;
        renderLoops();
    };

    window.toggleLoop = function(index) {
        if (activeLoopIndex === index) {
            if (!video.paused) {
                activeLoopIndex = -1; 
                video.pause();
            } else {
                video.play();
            }
        } else {
            activeLoopIndex = index;
            video.currentTime = markers[index];
            video.play();
        }
    };

    function renderLoops() {
        loopsContainer.innerHTML = '';
        
        if (markers.length < 2) {
            loopsPanel.style.display = 'none';
            return;
        }

        loopsPanel.style.display = 'flex';

        for (let i = 0; i < markers.length - 1; i++) {
            const startLabel = getLabel(i);
            const endLabel = getLabel(i + 1);
            
            const isActive = (activeLoopIndex === i);
            const isPlaying = isActive && !video.paused;
            
            let btnClass = 'btn-play';
            let btnText = 'Treinar';

            if (isActive) {
                if (isPlaying) {
                    btnClass = 'btn-stop';
                    btnText = 'Parar';
                } else {
                    btnClass = 'btn-resume';
                    btnText = 'Retomar';
                }
            }
            
            const div = document.createElement('div');
            div.className = `loop-item ${isActive ? 'active-loop' : ''}`;
            
            div.innerHTML = `
                <div class="loop-header">
                    <span>${startLabel} ➔ ${endLabel}</span>
                    <div class="header-actions">
                        ${i < markers.length - 2 ? `
                        <button class="btn-merge-inline" onclick="mergeLoop(${i})">
                            🔗 Juntar
                        </button>` : ''}
                        <button class="${btnClass}" onclick="toggleLoop(${i})">
                            ${btnText}
                        </button>
                    </div>
                </div>
                
                <div class="loop-controls">
                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i}, ${ADJUST_STEP})">+</button>
                    </div>

                    <span class="arrow-separator">➔</span>

                    <div class="time-adjuster">
                        <button onclick="adjustMarker(${i + 1}, -${ADJUST_STEP})">-</button>
                        <span class="time-display">${markers[i+1].toFixed(1)}s</span>
                        <button onclick="adjustMarker(${i + 1}, ${ADJUST_STEP})">+</button>
                    </div>
                </div>
            `;
            loopsContainer.appendChild(div);
        }
    }

    function checkLoop() {
        if (activeLoopIndex !== -1 && markers.length > activeLoopIndex + 1) {
            let start = markers[activeLoopIndex];
            let end = markers[activeLoopIndex + 1];
            
            if (video.currentTime >= end || video.currentTime < start) {
                video.currentTime = start;
            }
        }
        requestAnimationFrame(checkLoop);
    }
    requestAnimationFrame(checkLoop);

</script>

</body>
</html>
